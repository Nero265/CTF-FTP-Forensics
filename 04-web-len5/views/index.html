<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTF Length Bypass Challenge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #1e1e1e;
      color: #ffffff;
    }
    .card {
      background-color: #2a2a2a;
      color: #ffffff;
      border: none;
    }
  </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center vh-100">
  <div class="card p-4 shadow" style="width: 300px;">
    <h1 class="text-center">CTF Challenge</h1>
    <form id="challengeForm" class="mt-3">
      <div class="mb-3">
        <input type="text" id="inputField" class="form-control" placeholder='Enter number;'>
      </div>
      <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>
    <p id="message" class="mt-3 text-center"></p>
  </div>
  <script>
    document.getElementById("challengeForm").addEventListener("submit", function(event) {
      event.preventDefault();
      const input = document.getElementById("inputField").value;
      
      const payload = JSON.stringify({ num: input });
      
      fetch("/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload
      })
      .then(response => response.text())
      .then(text => {
        document.getElementById("message").textContent = text;
      })
      .catch(error => {
        document.getElementById("message").textContent = "Error: " + error;
      });
    });
  </script>
</body>
</html>
